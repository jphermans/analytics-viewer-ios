<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF"/>
      <stop offset="100%" style="stop-color:#5856D6"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Chart bars -->
  <rect x="96" y="296" width="56" height="120" rx="12" fill="url(#bar1)"/>
  <rect x="176" y="216" width="56" height="200" rx="12" fill="url(#bar1)"/>
  <rect x="256" y="256" width="56" height="160" rx="12" fill="url(#bar1)"/>
  <rect x="336" y="176" width="56" height="240" rx="12" fill="url(#bar1)"/>
  <!-- Trend line -->
  <polyline points="124,270 204,196 284,230 364,150" fill="none" stroke="#FFD60A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots -->
  <circle cx="124" cy="270" r="10" fill="#FFD60A"/>
  <circle cx="204" cy="196" r="10" fill="#FFD60A"/>
  <circle cx="284" cy="230" r="10" fill="#FFD60A"/>
  <circle cx="364" cy="150" r="10" fill="#FFD60A"/>
</svg>
