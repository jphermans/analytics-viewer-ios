<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0077B6"/>
      <stop offset="100%" stop-color="#48CAE4"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#005F8A"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#023E8A"/>
      <stop offset="100%" stop-color="#0096C7"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#48CAE4"/>
      <stop offset="100%" stop-color="#0096C7"/>
    </linearGradient>
  </defs>

  <!-- Foreground layer for iOS 26 Icon Composer - transparent background -->

  <!-- Document card -->
  <rect x="120" y="160" width="540" height="640" rx="32" fill="#081525" fill-opacity="0.7" stroke="#1A3A5C" stroke-width="2"/>

  <!-- Card header lines -->
  <rect x="185" y="215" width="200" height="14" rx="7" fill="#1A3A5C"/>
  <rect x="185" y="248" width="130" height="10" rx="5" fill="#152A42"/>

  <!-- Bar chart -->
  <rect x="185" y="560" width="64" height="140" rx="10" fill="url(#bar3)"/>
  <rect x="269" y="480" width="64" height="220" rx="10" fill="url(#bar2)"/>
  <rect x="353" y="390" width="64" height="310" rx="10" fill="url(#bar1)"/>
  <rect x="437" y="320" width="64" height="380" rx="10" fill="url(#bar2)"/>
  <rect x="521" y="420" width="64" height="280" rx="10" fill="url(#bar3)"/>

  <!-- Trend line -->
  <polyline points="217,540 301,460 385,370 469,300 553,400" fill="none" stroke="#48CAE4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Trend dots -->
  <circle cx="217" cy="540" r="9" fill="#48CAE4"/>
  <circle cx="301" cy="460" r="9" fill="#48CAE4"/>
  <circle cx="385" cy="370" r="9" fill="#48CAE4"/>
  <circle cx="469" cy="300" r="9" fill="#48CAE4"/>
  <circle cx="553" cy="400" r="9" fill="#48CAE4"/>

  <!-- Magnifying glass -->
  <g transform="translate(610, 500) rotate(-35)">
    <circle cx="0" cy="0" r="170" fill="#48CAE4" fill-opacity="0.08" stroke="#48CAE4" stroke-width="10"/>
    <circle cx="0" cy="0" r="148" fill="none" stroke="#48CAE4" stroke-width="2" opacity="0.25"/>
    <ellipse cx="-35" cy="-55" rx="65" ry="28" fill="white" opacity="0.07" transform="rotate(-15)"/>
    <line x1="125" y1="125" x2="255" y2="255" stroke="url(#handleGrad)" stroke-width="32" stroke-linecap="round"/>
  </g>

  <!-- Checkmark inside lens -->
  <g transform="translate(570, 465)">
    <polyline points="-28,0 -8,22 32,-28" fill="none" stroke="#48CAE4" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
